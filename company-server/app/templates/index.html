<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL Monitor — сервер фирмы</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            color-scheme: dark;
            --bg: #101418;
            --card: #182028;
            --card-2: #1f2933;
            --text: #e8edf2;
            --muted: #9fb0c0;
            --line: rgba(255, 255, 255, 0.08);
            --ok: #53d769;
            --bad: #ff6b6b;
            --warn: #f5c451;
            --ack: #72b7ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 1250px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 28px;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 22px;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .layout {
            display: grid;
            gap: 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
        }

        label {
            display: block;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: var(--card-2);
            color: var(--text);
            font-size: 15px;
        }

        button {
            border: 1px solid var(--line);
            background: var(--card-2);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            border-color: rgba(255, 255, 255, 0.22);
        }

        button.active {
            background: #2f4050;
            border-color: var(--ack);
            color: #ffffff;
        }

        .summary-grid,
        .filters-grid,
        .kv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 12px;
        }

        .summary-item,
        .kv-item,
        .event-item {
            background: var(--card-2);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
        }

        .summary-label,
        .kv-label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .summary-value,
        .kv-value {
            font-size: 20px;
            font-weight: 700;
            word-break: break-word;
        }

        .ok {
            color: var(--ok);
        }

        .bad {
            color: var(--bad);
        }

        .warn {
            color: var(--warn);
        }

        .ack {
            color: var(--ack);
        }

        .placeholder,
        .error-box {
            padding: 18px;
            border-radius: 12px;
            background: var(--card-2);
        }

        .error-box {
            border: 1px solid rgba(255, 107, 107, 0.35);
        }

        .device-list {
            display: grid;
            gap: 12px;
        }

        .device-row {
            cursor: pointer;
            transition: 0.12s ease;
        }

        .device-row:hover {
            transform: translateY(-1px);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .device-row.active {
            border-color: var(--ack);
        }

        .device-row-title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .device-row-meta {
            color: var(--muted);
            font-size: 13px;
        }

        .events-list {
            display: grid;
            gap: 10px;
        }

        .event-title {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .event-meta {
            color: var(--muted);
            font-size: 13px;
        }

        .history-list {
            margin: 0;
            padding-left: 20px;
        }

        .history-list li {
            margin: 6px 0;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .chart-range-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chart-wrap {
            height: 340px;
        }

        #deviceDetailsSection,
        #chartSection,
        #alarmHistorySection {
            display: none;
        }

        #secret-btn {
            position: fixed;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            opacity: 0.1;
            cursor: pointer;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <main class="page">
        <h1>Сервер фирмы GL Monitor</h1>

        <div class="layout">
            <section class="card">
                <h2>Главная сводка</h2>
                <div id="summaryData" class="summary-grid">
                    <div class="placeholder">Загрузка...</div>
                </div>
            </section>

            <section class="card">
                <h2>Фильтры</h2>
                <div class="filters-grid">
                    <div>
                        <label for="customerFilter">Заказчик</label>
                        <select id="customerFilter">
                            <option value="">Все заказчики</option>
                        </select>
                    </div>

                    <div>
                        <label for="siteFilter">Объект</label>
                        <select id="siteFilter">
                            <option value="">Все объекты</option>
                        </select>
                    </div>

                    <div>
                        <label for="gatewayFilter">Шлюз заказчика</label>
                        <select id="gatewayFilter">
                            <option value="">Все шлюзы заказчика</option>
                        </select>
                    </div>

                    <div>
                        <label for="stateFilter">Состояние</label>
                        <select id="stateFilter">
                            <option value="">Все устройства</option>
                            <option value="online">Только online</option>
                            <option value="offline">Только offline</option>
                            <option value="warning">Только предупреждения</option>
                            <option value="alarm">Только аварии</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>Активные аварии и предупреждения</h2>
                <div id="eventsData">
                    <div class="placeholder">Событий пока нет</div>
                </div>
            </section>

            <section class="card">
                <h2>Устройства</h2>
                <div id="devicesData">
                    <div class="placeholder">Данных от устройств пока нет</div>
                </div>
            </section>

            <section class="card" id="deviceDetailsSection">
                <h2 id="deviceTitle">Устройство</h2>
                <div id="deviceDetailsData">
                    <div class="placeholder">Выберите устройство</div>
                </div>
            </section>

            <section class="card" id="chartSection">
                <div class="chart-header">
                    <h2>График уставки и выходного давления</h2>

                    <div class="chart-range-buttons">
                        <button class="chart-range-btn active" data-minutes="5">5 мин</button>
                        <button class="chart-range-btn" data-minutes="30">30 мин</button>
                        <button class="chart-range-btn" data-minutes="60">1 час</button>
                    </div>
                </div>

                <div class="chart-wrap">
                    <canvas id="pressureChart"></canvas>
                </div>
            </section>

            <section class="card" id="alarmHistorySection">
                <h2>История аварий</h2>
                <div id="alarmHistoryData">
                    <div class="placeholder">Аварий пока не было</div>
                </div>
            </section>
        </div>
    </main>

    <div id="feature-container"></div>
    <div id="secret-btn" onclick="toggleFeature()"></div>

    <script src="/static/app.js"></script>
    <script src="/static/feature.js"></script>
</body>
</html>

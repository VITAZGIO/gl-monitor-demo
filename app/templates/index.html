<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GL Monitor Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <style>
      :root {
        color-scheme: dark;
        --bg: #101418;
        --card: #182028;
        --card-2: #1f2933;
        --text: #e8edf2;
        --muted: #9fb0c0;
        --line: rgba(255, 255, 255, 0.08);
        --ok: #53d769;
        --bad: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 28px;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 22px;
      }

      .layout {
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--card-2);
        color: var(--text);
        font-size: 15px;
      }

      .device-card h2 {
        margin-bottom: 18px;
      }

      .kv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .kv-item {
        background: var(--card-2);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }

      .kv-label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 8px;
      }

      .kv-value {
        font-size: 18px;
        font-weight: 700;
      }

      .ok {
        color: var(--ok);
      }

      .bad {
        color: var(--bad);
      }

      .debug-box {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: #111820;
      }

      .debug-title {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .debug-topic {
        margin-bottom: 10px;
        word-break: break-word;
      }

      .debug-payload {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: monospace;
        font-size: 13px;
      }

      .placeholder,
      .error-box {
        padding: 18px;
        border-radius: 12px;
        background: var(--card-2);
      }

      .error-box {
        border: 1px solid rgba(255, 107, 107, 0.35);
      }

      #chartCard {
        display: none;
      }

      .chart-wrap {
        height: 340px;
      }
      #secret-btn {
        position: fixed;
        bottom: 5px;
        right: 5px;
        width: 20px;
        height: 20px;
        opacity: 0.1;
        cursor: pointer;
        z-index: 9999;
      }
    </style>

  </head>

  <body>
    <main class="page">
      <h1>Панель мониторинга шкафов GL</h1>

      <div class="layout">
        <section class="card">
          <label for="deviceSelect">Выбрать устройство</label>
          <select id="deviceSelect">
            <option value="">Загрузка...</option>
          </select>
        </section>

        <section class="card" id="deviceData">
          Загрузка...
        </section>

        <section class="card" id="chartCard">
          <h2>График уставки давления</h2>
          <div class="chart-wrap">
            <canvas id="pressureChart"></canvas>
          </div>
        </section>
      </div>
    </main>

    <div id="feature-container"></div>
    <div id="secret-btn" onclick="toggleFeature()"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/feature.js"></script>
  </body>
</html>

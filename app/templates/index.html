<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GL Monitor Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f3f4f6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin-bottom: 24px;
        }

        .card {
            background: #1f2937;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select {
            width: 100%;
            max-width: 320px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #374151;
            color: white;
        }

        #deviceData p {
            margin: 8px 0;
        }

        #chartWrap {
            position: relative;
            height: 320px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Панель мониторинга шкафов GL</h1>

        <div class="card">
            <label for="deviceSelect">Выбрать устройство</label>
            <select id="deviceSelect">
                <option value="">Загрузка...</option>
            </select>
        </div>

        <div class="card">
            <div id="deviceData">
                <p>Выберите устройство</p>
            </div>
        </div>

        <div class="card" id="chartCard">
            <h2>График setpoint</h2>
            <div id="chartWrap">
                <canvas id="pressureChart"></canvas>
            </div>
        </div>
    </div>

    <div id="snake-container"></div>
    <button id="secret-btn" onclick="toggleSnake()" style="display: none;"></button>

    <script src="/static/app.js"></script>
    <script src="/static/snake.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL Monitor Demo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f3f4f6;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1f2937;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
            border: 1px solid #374151;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            color: #f9fafb;
            font-size: 28px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #d1d5db;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #374151;
            color: #f9fafb;
            border: 1px solid #4b5563;
            border-radius: 10px;
        }

        .card {
            margin-top: 24px;
            padding: 20px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 12px;
        }

        .row {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .name {
            font-weight: bold;
            color: #f3f4f6;
        }

        .empty {
            color: #9ca3af;
        }

        .chart-title {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 20px;
            color: #f9fafb;
        }

        .chart-wrap {
            position: relative;
            height: 320px;
        }

        #secret-btn {
            position: fixed;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            opacity: 0.1;
            cursor: pointer;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Панель мониторинга шкафов GL</h1>

        <label for="deviceSelect">Выбрать устройство</label>
        <select id="deviceSelect">
            <option value="">Загрузка...</option>
        </select>

        <div class="card" id="deviceData">
            <div class="empty">Выберите устройство</div>
        </div>

        <div class="card" id="chartCard" style="display: none;">
            <h2 class="chart-title">График setpoint</h2>
            <div class="chart-wrap">
                <canvas id="pressureChart"></canvas>
            </div>
        </div>
    </div>

    <div id="feature-container"></div>
    <div id="secret-btn" onclick="toggleFeature()"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/feature.js"></script>
</body>
</html>

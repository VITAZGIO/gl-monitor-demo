
services:
  company-server:
    build: ./company-server
    container_name: gl-monitor-company-server
    ports:
      - "8000:8000"
    environment:
      COMPANY_API_TOKEN: demo-token
    restart: unless-stopped

  gateway-app:
    build: ./gateway
    container_name: gl-monitor-gateway
    ports:
      - "8100:8100"
    environment:
      MQTT_HOST: gateway-mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: devices/+/telemetry

      APP_TIMEZONE: Europe/Berlin
      LOG_LEVEL: INFO

      GATEWAY_ID: GlobeDemo-01
      CUSTOMER_ID: Globe
      SITE_ID: Office

      COMPANY_API_URL: http://company-server:8000/api/ingest/gateway
      COMPANY_API_TOKEN: demo-token
      EXPORT_INTERVAL_SECONDS: 5
    depends_on:
      - gateway-mosquitto
      - company-server
    restart: unless-stopped

  gateway-mosquitto:
    image: eclipse-mosquitto:2
    container_name: gl-monitor-gateway-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  test-publisher:
    build:
      context: .
      dockerfile: publisher.Dockerfile
    container_name: gl-monitor-publisher
    environment:
      MQTT_HOST: gateway-mosquitto
      MQTT_PORT: 1883
      DEVICE_ID: ESP32-DEMO-001
      PUBLISH_INTERVAL: 5
    depends_on:
      - gateway-mosquitto
    restart: unless-stopped
    profiles:
      - demo-publisher

services:
  gl-monitor-demo:
    build: .
    container_name: gl-monitor-demo
    ports:
      - "8000:8000"
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: devices/+/telemetry
      APP_TIMEZONE: Europe/Berlin
      LOG_LEVEL: INFO
    depends_on:
      - mosquitto
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: gl-monitor-mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  test-publisher:
    build:
      context: .
      dockerfile: publisher.Dockerfile
    container_name: gl-monitor-publisher
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      DEVICE_ID: ESP32-DEMO-001
      PUBLISH_INTERVAL: 3
    depends_on:
      - mosquitto
    restart: unless-stopped
    profiles:
      - demo-publisher
